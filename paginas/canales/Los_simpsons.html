<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Simpsons | THE GAME</title>
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        /* BARRA DE CONTROLES COMPACTA (DEBAJO DEL HEADER) */
        .control-bar {
            display: flex;
            justify-content: left;
            align-items: center;
            gap: 10px;
            margin-left: 1rem;
            padding: 10px;
            background: rgba(20, 20, 26, 0.8);
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
            margin-bottom: 15px;
        }

        .switch-btn {
            background: #1a1a20;
            border: 1px solid #00f2ff;
            color: #00f2ff;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .switch-btn.off {
            opacity: 0.4;
            border-color: #555;
            color: #888;
        }

        /* BOTÓN SEÑAL PEQUEÑO Y DESPLEGABLE */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .btn-signal-small {
            background: #00f2ff;
            color: #000;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: #1a1a20;
            min-width: 180px;
            border: 1px solid #00f2ff;
            z-index: 1000;
            border-radius: 4px;
            margin-top: 5px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }

        .dropdown-content.show {
            display: block;
        }

        .dropdown-content button {
            width: 100%;
            padding: 10px;
            background: transparent;
            color: white;
            border: none;
            text-align: left;
            cursor: pointer;
            font-size: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .dropdown-content button:hover {
            background: rgba(0, 242, 255, 0.1);
            color: #00f2ff;
        }

        /* AJUSTES DE EXPANSIÓN */
        .dashboard-container {
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        .main-panel {
            flex: 1;
            min-width: 0;
            height: 700px;
            transition: all 0.5s ease;
        }

        .side-panel {
            width: 300px;
            height: 700px;
            transition: all 0.4s ease;
        }

        .side-panel.is-hidden {
            width: 0;
            opacity: 0;
            overflow: hidden;
            margin: 0;
        }

        .glass-frame {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <header>
        <a href="../Pagina-principal.html" class="logo">THE <span>GAME</span></a>
        <nav>
            <a href="tyc-sports.html">TyC Sports</a>
            <a href="Directv.html">DirecTV</a>
            <a href="fox-sport.html">Fox Sports</a>
            <a href="Espn-premium.html">ESPN Premium</a>
        </nav>
    </header>

    <div class="control-bar">
        <button class="switch-btn" id="tgl-left" onclick="toggleView('left')">Marcadores: ON</button>
        <button class="switch-btn" id="tgl-right" onclick="toggleView('right')">Video Secundario: ON</button>
        
        <div class="dropdown">
            <button class="btn-signal-small" onclick="toggleDropdown()">▼ SEÑAL</button>
            <div id="signalDropdown" class="dropdown-content">
                <button onclick="changeSrc('https://simpsonizados.me/')">Opción 1: Principal</button>
            </div>
        </div>
    </div>

    <div class="dashboard-container">
        <aside class="side-panel" id="panel-left">
            <div class="glass-frame" style="aspect-ratio: 9/16; height: 700px;">
                <iframe src="https://www.promiedos.com.ar"></iframe>
            </div>
        </aside>

        <main class="main-panel">
            <div class="glass-frame">
                <iframe id="main-player" src="https://simpsonizados.me/" allowfullscreen></iframe>
            </div>
        </main>

        <aside class="side-panel" id="panel-right">
            <div class="glass-frame">
                <iframe src="https://www.youtube.com/embed/zZ7AimPACzc" allowfullscreen></iframe>
            </div>
        </aside>
    </div>


    <script>
        // Control del menú de señales
        function toggleDropdown() {
            document.getElementById("signalDropdown").classList.toggle("show");
        }

        function changeSrc(url) {
            document.getElementById('main-player').src = url;
            document.getElementById("signalDropdown").classList.remove("show");
        }

        // Control de visibilidad de paneles (ON/OFF)
        function toggleView(side) {
            const isLeft = side === 'left';
            const panel = document.getElementById(isLeft ? 'panel-left' : 'panel-right');
            const btn = document.getElementById(isLeft ? 'tgl-left' : 'tgl-right');
            const label = isLeft ? 'Marcadores' : 'Video Secundario';

            panel.classList.toggle('is-hidden');
            btn.classList.toggle('off');
            
            if (panel.classList.contains('is-hidden')) {
                btn.textContent = `${label}: OFF`;
            } else {
                btn.textContent = `${label}: ON`;
            }
        }

        // Cerrar menú si haces clic fuera
        window.onclick = function(event) {
            if (!event.target.matches('.btn-signal-small')) {
                var dropdowns = document.getElementsByClassName("dropdown-content");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }
    </script>
</body>
</html>
