<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agenda THE GAME</title>
    <meta http-equiv="refresh" content="300">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap');
        
        :root {
            --accent: #00f2ff;
            --bg-card: #0e0e11;
            --border: rgba(255, 255, 255, 0.08);
            --text-muted: #a1a1aa;
        }

        body {
            background: transparent;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            padding: 10px;
        }

        #dayBanner {
            color: var(--accent);
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            text-align: center;
        }

        .matches {
            display: grid;
            gap: 12px;
        }

        .match-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: white;
        }

        .match-card:hover {
            border-color: var(--accent);
            background: #16161a;
            transform: translateX(5px);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

        .time-badge {
            background: rgba(0, 242, 255, 0.1);
            color: var(--accent);
            padding: 6px 10px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 0.85rem;
            min-width: 50px;
            text-align: center;
        }

        .match-info { flex-grow: 1; }

        .event-title {
            font-weight: 700;
            font-size: 0.95rem;
            margin-bottom: 2px;
        }

        .event-meta {
            color: var(--text-muted);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="dayBanner"></div>
    <div id="agenda">Cargando eventos...</div>

    <script>
        const API_URL = 'https://api.infutbol.site/matches/today';
        const EVENTOS_JSON = 'https://json.angulismotv.workers.dev/euents';
        const STREAMTP_EVENTOS = 'https://streamtp.angulismotv.workers.dev/eventos.json';
        const LA14HD_EVENTOS = 'https://la14hd.angulismotv.workers.dev/eventos/json/agenda123.json';

        function pad(n) { return n.toString().padStart(2, '0'); }
        
        function formatDayBanner() {
            const now = new Date();
            const dias = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
            return `Agenda - ${dias[now.getDay()]} ${pad(now.getDate())}/${pad(now.getMonth()+1)}`;
        }

        async function fetchJSON(url) {
            try {
                const res = await fetch(url, { cache: 'no-store' });
                return await res.json();
            } catch (e) { return null; }
        }

        function convertTime(timeStr) {
            if (!timeStr) return '--:--';
            // Si viene con fecha, extraer solo HH:MM
            if (timeStr.includes(' ')) return timeStr.split(' ')[1].substring(0, 5);
            return timeStr.substring(0, 5);
        }

async function init() {
    const banner = document.getElementById('dayBanner');
    if (banner) banner.textContent = formatDayBanner();
    
    const agenda = document.getElementById('agenda');
    agenda.innerHTML = '<p style="text-align:center; color:gray;">Buscando eventos en vivo...</p>';
    
    try {
        const [manual, stp, la14] = await Promise.all([
            fetchJSON(EVENTOS_JSON),
            fetchJSON(STREAMTP_EVENTOS),
            fetchJSON(LA14HD_EVENTOS)
        ]);

        // Verificamos si los datos vienen dentro de una propiedad "Events" o directamente
        const eventosManuales = Array.isArray(manual) ? manual : (manual?.Events || []);
        const eventosSTP = Array.isArray(stp) ? stp : (stp?.Events || []);
        const eventosLA14 = Array.isArray(la14) ? la14 : (la14?.Events || []);

        const allEvents = [...eventosManuales, ...eventosSTP, ...eventosLA14];

        if (allEvents.length === 0) {
            agenda.innerHTML = '<p style="text-align:center; color:gray;">No hay eventos programados para esta hora.</p>';
            return;
        }

        agenda.innerHTML = ''; // Limpiamos el cargando
        const container = document.createElement('div');
        container.className = 'matches';

        allEvents.forEach(ev => {
            const card = document.createElement('div');
            card.className = 'match-card';
            
            // Intentamos obtener la hora de diferentes posibles nombres de campo
            const horaRaw = ev.time || ev.fecha || ev.start_time || '--:--';
            const hora = convertTime(horaRaw);
            const titulo = ev.title || ev.evento || 'Evento Especial';
            const competencia = ev.category || ev.competencia || 'En Vivo';

            card.innerHTML = `
                <div class="time-badge">${hora}</div>
                <div class="match-info">
                    <div class="event-title">${titulo}</div>
                    <div class="event-meta">${competencia}</div>
                </div>
            `;

            card.onclick = () => window.parent.location.href = '../tyc-sports.html';
            container.appendChild(card);
        });

        agenda.appendChild(container);
    } catch (error) {
        console.error("Error al cargar la agenda:", error);
        agenda.innerHTML = '<p style="text-align:center; color:red;">Error de conexión con la agenda.</p>';
    }
}

        init();
    </script>
</body>
</html>
